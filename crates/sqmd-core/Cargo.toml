[package]
name = "sqmd-core"
version = "0.1.0"
edition = "2021"

[dependencies]
rusqlite = { version = "0.34", features = ["bundled"] }
sqlite-vec = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "2"
ort = "2.0.0-rc.12"
ndarray = "0.17"
ignore = "0.4"
walkdir = "2"
tree-sitter = "0.24"
tree-sitter-typescript = "0.23"
tree-sitter-rust = "0.23"
tree-sitter-python = "0.23"
rayon = "1.10"
notify = "7"
tempfile = "3"
regex = "1"
