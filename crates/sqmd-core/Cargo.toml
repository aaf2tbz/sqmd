[package]
name = "sqmd-core"
version = "0.1.0"
edition = "2024"

[dependencies]
rusqlite = { version = "0.34", features = ["bundled"] }
sqlite-vec = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "2"
ort = "2.0.0-rc.12"
ndarray = "0.17"
ignore = "0.4"
walkdir = "2"
