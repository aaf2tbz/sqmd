name: Bump Version

on:
  push:
    branches: [main]
    paths:
      - "CHANGELOG.md"

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from CHANGELOG
        id: version
        run: |
          HEADER=$(grep -m1 '^## \[' CHANGELOG.md)
          VERSION=$(echo "$HEADER" | sed 's/## \[\(.*\)\].*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version changed
        id: changed
        run: |
          CURRENT=$(grep '^version' crates/sqmd-cli/Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "$CURRENT" = "${{ steps.version.outputs.version }}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump Cargo.toml versions
        if: steps.changed.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" crates/sqmd-core/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" crates/sqmd-cli/Cargo.toml

      - name: Update Cargo.lock
        if: steps.changed.outputs.changed == 'true'
        run: cargo generate-lockfile

      - name: Commit and push
        if: steps.changed.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crates/sqmd-core/Cargo.toml crates/sqmd-cli/Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push
